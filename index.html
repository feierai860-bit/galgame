<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>街角餐厅的邂逅</title>
<style>
  :root {
    --bg: #0a0a0c;
    --text: #f0ece4;
    --text-dim: #b8b0a0;
    --gold: #c8a868;
    --gold-light: #e8d5a3;
    --accent: #c47a5a;
    --panel-bg: rgba(10,8,6,0.85);
    --ui-opacity: 0.85;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'VN';
    src: local('Noto Serif SC'), local('SimSun'), local('Microsoft YaHei'), local('PingFang SC');
  }

  body {
    background: var(--bg);
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'PingFang SC', 'Microsoft YaHei', serif;
    user-select: none; -webkit-user-select: none;
    cursor: default;
  }

  /* ── Layers ── */
  #game-view {
    position: relative; width: 100%; height: 100%;
    overflow: hidden;
  }

  .layer {
    position: absolute; inset: 0;
    transition: opacity 0.8s ease;
  }

  #bg-layer {
    background-size: cover; background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }

  #cg-layer {
    background-size: contain; background-position: center;
    background-repeat: no-repeat;
    background-color: rgba(0,0,0,0.92);
    z-index: 2; opacity: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  #cg-layer.active { opacity: 1; pointer-events: auto; }
  #cg-layer img { max-width: 100%; max-height: 100%; object-fit: contain; }

  #char-layer {
    z-index: 1; display: flex; align-items: flex-end; justify-content: center;
    pointer-events: none; padding-bottom: 0;
  }
  #char-layer img {
    max-height: 82vh; max-width: 42vw;
    object-fit: contain; object-position: bottom;
    transition: opacity 0.5s ease, transform 0.5s ease;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  }

  /* ── UI Layer ── */
  #ui-layer {
    position: absolute; inset: 0; z-index: 3;
    pointer-events: none;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  #ui-layer.hidden #text-panel,
  #ui-layer.hidden #name-tag,
  #ui-layer.hidden #top-bar { opacity: 0; pointer-events: none; }

  /* Top bar */
  #top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px;
    pointer-events: auto; z-index: 5;
    transition: opacity 0.4s;
  }
  .top-btn {
    background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.7); font-size: 0.78rem;
    padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.04em;
    transition: all 0.25s; pointer-events: auto;
    backdrop-filter: blur(6px);
  }
  .top-btn:hover { background: rgba(0,0,0,0.65); color: #fff; border-color: rgba(255,255,255,0.25); }
  .top-btn.active { background: rgba(200,168,104,0.25); border-color: var(--gold); color: var(--gold-light); }

  #affection-indicator {
    color: rgba(255,255,255,0.45); font-size: 0.75rem;
    letter-spacing: 0.06em; display: flex; align-items: center; gap: 6px;
  }
  #affection-indicator .heart { color: var(--accent); font-size: 0.85rem; }

  /* Settings panel */
  #settings-panel {
    position: absolute; top: 50px; right: 12px;
    background: rgba(10,8,6,0.92); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px; padding: 18px 22px; z-index: 10;
    pointer-events: auto; backdrop-filter: blur(12px);
    display: none; flex-direction: column; gap: 14px;
    min-width: 240px; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }
  #settings-panel.open { display: flex; }
  #settings-panel label {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text-dim); font-size: 0.8rem; letter-spacing: 0.05em;
  }
  #settings-panel input[type=range] {
    width: 110px; accent-color: var(--gold);
  }
  #settings-panel .set-title {
    color: var(--gold-light); font-size: 0.82rem;
    letter-spacing: 0.08em; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 8px; margin-bottom: 2px;
  }

  /* Text panel */
  #text-panel {
    pointer-events: auto;
    background: linear-gradient(to top, rgba(10,8,6,var(--ui-opacity)) 0%, rgba(10,8,6,calc(var(--ui-opacity)*0.85)) 70%, transparent 100%);
    padding: 40px 32px 28px;
    transition: opacity 0.5s;
    min-height: 170px;
  }

  #name-tag {
    pointer-events: auto;
    margin: 0 32px; padding: 7px 18px;
    background: rgba(10,8,6,0.80); border-left: 2px solid var(--gold);
    color: var(--gold-light); font-size: 0.88rem; font-weight: 600;
    letter-spacing: 0.08em; display: inline-block; width: fit-content;
    border-radius: 4px 4px 0 0;
    transition: opacity 0.4s;
    backdrop-filter: blur(6px);
  }

  #dialogue-text {
    color: var(--text); font-size: 1.15rem; line-height: 1.85;
    letter-spacing: 0.04em; min-height: 60px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }

  /* Choices */
  #choices-area {
    display: flex; flex-direction: column; gap: 10px; margin-top: 14px;
    pointer-events: auto;
  }
  .choice-btn {
    background: rgba(200,168,104,0.08); border: 1px solid rgba(200,168,104,0.2);
    color: var(--gold-light); font-size: 1rem; padding: 12px 20px;
    border-radius: 10px; cursor: pointer; text-align: left;
    font-family: inherit; letter-spacing: 0.05em;
    transition: all 0.3s ease;
  }
  .choice-btn:hover {
    background: rgba(200,168,104,0.18); border-color: var(--gold);
    padding-left: 28px; color: #fff;
    box-shadow: 0 4px 20px rgba(200,168,104,0.12);
  }

  /* Click indicator */
  #click-hint {
    position: absolute; bottom: 20px; right: 28px;
    color: rgba(255,255,255,0.3); font-size: 0.7rem;
    pointer-events: none; z-index: 4;
    animation: hintPulse 2s ease-in-out infinite;
    letter-spacing: 0.06em;
  }
  @keyframes hintPulse {
    0%,100% { opacity: 0.25; }
    50% { opacity: 0.6; }
  }

  /* Title Screen */
  #title-screen {
    position: absolute; inset: 0; z-index: 20;
    background: radial-gradient(ellipse at 50% 40%, #1a1410 0%, #0a0805 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 30px; transition: opacity 0.8s, pointer-events 0s 0.8s;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s, pointer-events 0s; }
  #title-screen .title-cn {
    font-size: 2.6rem; font-weight: 700; letter-spacing: 0.15em;
    color: var(--gold-light);
    text-shadow: 0 2px 20px rgba(200,168,104,0.3);
  }
  #title-screen .title-sub {
    color: var(--text-dim); font-size: 0.9rem; letter-spacing: 0.12em;
    margin-top: -16px;
  }
  #title-screen .start-btn {
    background: transparent; border: 1px solid rgba(200,168,104,0.35);
    color: var(--gold-light); font-size: 1.15rem; padding: 14px 48px;
    border-radius: 50px; cursor: pointer; font-family: inherit;
    letter-spacing: 0.12em; transition: all 0.4s;
  }
  #title-screen .start-btn:hover {
    background: rgba(200,168,104,0.12); border-color: var(--gold);
    box-shadow: 0 0 40px rgba(200,168,104,0.15);
    letter-spacing: 0.18em;
  }
  #title-screen .title-footer {
    color: rgba(255,255,255,0.2); font-size: 0.68rem; letter-spacing: 0.1em;
    position: absolute; bottom: 24px;
  }

  /* Ending screen */
  #ending-screen {
    position: absolute; inset: 0; z-index: 22;
    background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; opacity: 0; pointer-events: none; transition: opacity 1s;
  }
  #ending-screen.active { opacity: 1; pointer-events: auto; }
  #ending-screen .ending-type {
    font-size: 1rem; letter-spacing: 0.2em; color: var(--gold);
    text-transform: uppercase;
  }
  #ending-screen .ending-title {
    font-size: 2.2rem; letter-spacing: 0.12em; color: var(--gold-light);
  }
  #ending-screen .ending-subtitle {
    color: var(--text-dim); font-size: 0.9rem; text-align: center;
    max-width: 480px; line-height: 1.7; letter-spacing: 0.04em;
  }

  /* Image preload (hidden) */
  #preload { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
</style>
</head>
<body>

<!-- Preload images -->
<div id="preload"></div>

<!-- Game View -->
<div id="game-view">
  <div class="layer" id="bg-layer"></div>
  <div class="layer" id="char-layer"></div>
  <div class="layer" id="cg-layer"></div>

  <!-- Title Screen -->
  <div id="title-screen">
    <div class="title-cn">街角餐厅的邂逅</div>
    <div class="title-sub">—— 在城市的某个角落，有一盏灯为你亮着</div>
    <button class="start-btn" onclick="startGame()">开 始</button>
    <div class="title-footer">A Visual Novel · 约 10 分钟</div>
  </div>

  <!-- Ending Screen -->
  <div id="ending-screen">
    <div class="ending-type" id="ending-type"></div>
    <div class="ending-title" id="ending-title"></div>
    <div class="ending-subtitle" id="ending-subtitle"></div>
    <button class="start-btn" onclick="returnToTitle()" style="margin-top:12px;">返回标题</button>
  </div>

  <!-- UI Layer -->
  <div id="ui-layer">
    <!-- Top bar -->
    <div id="top-bar">
      <button class="top-btn" onclick="toggleSettings()" title="设置">⚙ 设置</button>
      <button class="top-btn" id="btn-hide-ui" onclick="toggleHideUI()" title="隐藏界面">👁 隐藏UI</button>
      <div id="affection-indicator"><span class="heart">♥</span> <span id="aff-val">0</span></div>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel">
      <div class="set-title">设 置</div>
      <label>BGM 音量 <input type="range" id="vol-bgm" min="0" max="100" value="60" oninput="updateVolumes()"></label>
      <label>UI 透明度 <input type="range" id="opacity-ui" min="40" max="100" value="85" oninput="updateOpacity()"></label>
      <label>文字速度 <input type="range" id="text-speed" min="20" max="100" value="55" oninput="updateTextSpeed()"></label>
      <button class="top-btn" onclick="saveGame()" style="width:100%;text-align:center;">💾 保存进度</button>
      <button class="top-btn" onclick="loadGame()" style="width:100%;text-align:center;">📂 读取进度</button>
    </div>

    <!-- Name tag -->
    <div id="name-tag"></div>

    <!-- Text panel -->
    <div id="text-panel">
      <div id="dialogue-text"></div>
      <div id="choices-area"></div>
    </div>

    <!-- Click hint -->
    <div id="click-hint">点击继续 ▸</div>
  </div>
</div>

<script>
// ======================== PATHS ========================
const BG_PATH  = 'images/bg/';
const CHAR_PATH = 'images/char/';
const CG_PATH   = 'images/cg/';
const BGM_PATH  = 'images/bgm/';

// ======================== GAME STATE ========================
let affection = 0;
let currentLine = 0;
let currentScene = null;
let currentScript = [];
let isTyping = false;
let typeTimer = null;
let textSpeed = 55;       // ms per char
let uiHidden = false;
let settingsOpen = false;
let gameStarted = false;
let bgmCurrent = null;
let bgmAudio = null;
let bgmVolume = 0.6;
let uiOpacity = 0.85;

// ======================== AUDIO ========================
function playBGM(filename, vol) {
  const targetVol = vol !== undefined ? vol : bgmVolume;
  if (bgmAudio && bgmCurrent === filename) return;

  if (bgmAudio) {
    // Fade out current
    const old = bgmAudio;
    let fadeVol = old.volume;
    const fadeOut = setInterval(() => {
      fadeVol = Math.max(0, fadeVol - 0.04);
      old.volume = fadeVol;
      if (fadeVol <= 0) { clearInterval(fadeOut); old.pause(); old.remove(); }
    }, 60);
  }

  if (!filename) { bgmCurrent = null; bgmAudio = null; return; }

  const audio = new Audio(BGM_PATH + filename);
  audio.loop = true;
  audio.volume = 0;
  audio.play().catch(() => {});
  bgmAudio = audio;
  bgmCurrent = filename;

  // Fade in
  let fadeVol = 0;
  const fadeIn = setInterval(() => {
    fadeVol = Math.min(targetVol, fadeVol + 0.03);
    audio.volume = fadeVol;
    if (fadeVol >= targetVol) clearInterval(fadeIn);
  }, 60);
}

function updateVolumes() {
  bgmVolume = parseInt(document.getElementById('vol-bgm').value) / 100;
  if (bgmAudio) bgmAudio.volume = bgmVolume;
}

function updateOpacity() {
  uiOpacity = parseInt(document.getElementById('opacity-ui').value) / 100;
  document.documentElement.style.setProperty('--ui-opacity', uiOpacity);
}

function updateTextSpeed() {
  textSpeed = 105 - parseInt(document.getElementById('text-speed').value); // invert: 20→85, 100→5
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
}

function toggleHideUI() {
  uiHidden = !uiHidden;
  document.getElementById('ui-layer').classList.toggle('hidden', uiHidden);
  document.getElementById('btn-hide-ui').classList.toggle('active', uiHidden);
  document.getElementById('btn-hide-ui').textContent = uiHidden ? '👁 显示UI' : '👁 隐藏UI';
}

// ======================== SAVE / LOAD ========================
function saveGame() {
  const data = {
    affection, currentLine, currentScene,
    bgmCurrent,
    timestamp: Date.now(),
  };
  localStorage.setItem('galgame_save', JSON.stringify(data));
  showQuickMsg('已保存');
  toggleSettings();
}

function loadGame() {
  const raw = localStorage.getItem('galgame_save');
  if (!raw) { showQuickMsg('没有存档'); toggleSettings(); return; }
  const data = JSON.parse(raw);
  affection = data.affection;
  currentLine = data.currentLine;
  currentScene = data.currentScene;
  document.getElementById('aff-val').textContent = affection;
  if (data.bgmCurrent) playBGM(data.bgmCurrent);
  settingsOpen = false;
  document.getElementById('settings-panel').classList.remove('open');

  // Find the scene in script
  const scene = scenes.find(s => s.id === currentScene);
  if (!scene) { showQuickMsg('存档损坏'); return; }
  currentScript = scene.lines;

  // Advance to the saved line
  const target = Math.min(currentLine, currentScript.length - 1);
  currentLine = target;
  renderLine();
}

function showQuickMsg(msg) {
  // Tiny toast
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99;background:rgba(0,0,0,0.8);color:#fff;padding:8px 24px;border-radius:20px;font-size:0.8rem;pointer-events:none;transition:opacity 0.5s;';
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, 1500);
}

// ======================== PRELOAD ========================
function preloadImages(paths) {
  const container = document.getElementById('preload');
  paths.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    container.appendChild(img);
  });
}

// ======================== RENDER ========================
function setBG(filename) {
  const layer = document.getElementById('bg-layer');
  layer.style.opacity = '0';
  setTimeout(() => {
    layer.style.backgroundImage = filename ? `url(${BG_PATH}${filename})` : 'none';
    layer.style.opacity = '1';
  }, 300);
}

let _charTimer = null;
let _charImg = null;

function setChar(filename) {
  const layer = document.getElementById('char-layer');
  // Clear any pending timer
  if (_charTimer) { clearTimeout(_charTimer); _charTimer = null; }

  if (!filename) {
    // Remove character
    if (_charImg) { _charImg.style.opacity = '0'; _charImg = null; }
    _charTimer = setTimeout(() => {
      layer.innerHTML = '';
      _charTimer = null;
    }, 500);
    return;
  }

  // If we already have an image, fade it out
  if (_charImg) _charImg.style.opacity = '0';

  _charTimer = setTimeout(() => {
    // Remove old images
    layer.innerHTML = '';
    // Create single image
    _charImg = document.createElement('img');
    _charImg.src = CHAR_PATH + filename;
    _charImg.style.opacity = '0';
    _charImg.onload = () => { if (_charImg) _charImg.style.opacity = '1'; };
    _charImg.onerror = () => { if (_charImg) _charImg.style.opacity = '1'; };
    layer.appendChild(_charImg);
    // Fallback
    setTimeout(() => { if (_charImg) _charImg.style.opacity = '1'; }, 300);
    _charTimer = null;
  }, 300);
}

function showCG(filename, show) {
  const layer = document.getElementById('cg-layer');
  if (show && filename) {
    layer.innerHTML = `<img src="${CG_PATH}${filename}" alt="">`;
    layer.classList.add('active');
  } else {
    layer.classList.remove('active');
    setTimeout(() => { layer.innerHTML = ''; }, 600);
  }
}

function setNameTag(name) {
  const tag = document.getElementById('name-tag');
  tag.textContent = name || '';
  tag.style.opacity = name ? '1' : '0';
}

function setAffection(val) {
  affection = Math.max(0, Math.min(5, val));
  document.getElementById('aff-val').textContent = affection;

  // Brief heart glow effect
  const hearts = document.querySelectorAll('#affection-indicator .heart');
  hearts.forEach(h => {
    h.style.transform = 'scale(1.6)';
    h.style.color = '#ff9999';
    setTimeout(() => { h.style.transform = 'scale(1)'; h.style.color = 'var(--accent)'; }, 400);
  });
}

// ======================== TYPEWRITER ========================
function typeText(text, callback) {
  const el = document.getElementById('dialogue-text');
  const choicesArea = document.getElementById('choices-area');
  choicesArea.innerHTML = '';
  el.textContent = '';
  isTyping = true;

  let i = 0;
  const chars = [...text]; // handles CJK properly
  function tick() {
    if (i < chars.length) {
      el.textContent += chars[i];
      i++;
      typeTimer = setTimeout(tick, textSpeed);
      updateDebug();
    } else {
      isTyping = false;
      typeTimer = null;
      if (callback) callback();
    }
  }
  tick();
}

function skipType() {
  if (!isTyping) return false;
  clearTimeout(typeTimer);
  typeTimer = null;
  isTyping = false;
  const el = document.getElementById('dialogue-text');
  // Show full text from current script line
  const line = currentScript[currentLine];
  if (line && line.text) el.textContent = line.text;
  return true;
}

// ======================== CHOICES ========================
function renderChoices(choices) {
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${i + 1}. ${ch.text}`;
    btn.onclick = () => selectChoice(ch);
    area.appendChild(btn);
  });
  document.getElementById('click-hint').style.display = 'none';
}

function selectChoice(choice) {
  if (choice.affection) setAffection(affection + choice.affection);
  if (choice.bgm) playBGM(choice.bgm);

  // Go to next scene
  const targetScene = scenes.find(s => s.id === choice.nextScene);
  if (targetScene) {
    currentScene = choice.nextScene;
    currentScript = targetScene.lines;
    currentLine = 0;
    document.getElementById('choices-area').innerHTML = '';
    document.getElementById('click-hint').style.display = 'block';
    if (targetScene.bgm) playBGM(targetScene.bgm);
    if (targetScene.bg) setBG(targetScene.bg);
    renderLine();
  } else if (choice.nextScene === 'ending_true') {
    showEnding('true');
  } else if (choice.nextScene === 'ending_good') {
    showEnding('good');
  } else if (choice.nextScene === 'ending_normal') {
    showEnding('normal');
  }
}

// ======================== LINE RENDERING ========================
function renderLine() {
  if (!currentScript || currentLine >= currentScript.length) {
    return;
  }

  const line = currentScript[currentLine];
  if (!line) {
    return;
  }

  try {
    // Handle bg changes
    if (line.bg) setBG(line.bg);
    // Handle char changes
    if (line.char !== undefined) setChar(line.char);
    // Handle CG
    if (line.cg !== undefined) {
      showCG(line.cg, line.cgShow !== false);
    } else if (line.cgShow === false) {
      showCG(null, false);
    }
    // Handle BGM
    if (line.bgm) playBGM(line.bgm);
    // Handle affection
    if (line.affection) setAffection(affection + line.affection);

    // Name tag
    if (line.speaker !== undefined) setNameTag(line.speaker);

    // Choices override text
    if (line.choices) {
      renderChoices(line.choices);
      return;
    }

    // Clear choices area
    document.getElementById('choices-area').innerHTML = '';
    document.getElementById('click-hint').style.display = 'block';

    // Type text
    if (line.text) {
      typeText(line.text, () => {
        // typing done
      });
    } else {
      document.getElementById('dialogue-text').textContent = '';
      advanceLine();
    }
  } catch(err) {
    document.getElementById('dialogue-text').textContent = '出错了，请刷新页面重试。';
  }
}

function advanceLine() {
  if (isTyping) return;

  if (currentScript && currentScript[currentLine] && currentScript[currentLine].choices) {
    return;
  }

  currentLine++;
  if (!currentScript || currentLine >= currentScript.length) {
    // Scene ended — check for auto next
    const scene = scenes.find(s => s.id === currentScene);
    if (scene && scene.autoNext) {
      // Special: resolve ending based on affection
      if (scene.autoNext === '_resolve') {
        if (affection >= 3) showEnding('true');
        else if (affection >= 2) showEnding('good');
        else showEnding('normal');
        return;
      }
      const next = scenes.find(s => s.id === scene.autoNext);
      if (next) {
        currentScene = next.id;
        currentScript = next.lines;
        currentLine = 0;
        if (next.bgm) playBGM(next.bgm);
        if (next.bg) setBG(next.bg);
        renderLine();
        return;
      }
    }
    // Check for ending
    if (scene && scene.ending) {
      showEnding(scene.ending);
      return;
    }
    return;
  }
  renderLine();
}

// ======================== ENDINGS ========================
function showEnding(type) {
  const screen = document.getElementById('ending-screen');
  const etype = document.getElementById('ending-type');
  const etitle = document.getElementById('ending-title');
  const esub = document.getElementById('ending-subtitle');

function returnToTitle() {
  document.getElementById('ending-screen').classList.remove('active');
  document.getElementById('ui-layer').style.opacity = '1';
  showCG(null, false);
  setChar(null);
  setBG('');
  setNameTag('');
  document.getElementById('dialogue-text').textContent = '';
  document.getElementById('choices-area').innerHTML = '';
  document.getElementById('click-hint').style.display = 'none';
  affection = 0;
  currentLine = 0;
  currentScene = null;
  currentScript = [];
  document.getElementById('aff-val').textContent = '0';
  document.getElementById('title-screen').classList.remove('hidden');
  gameStarted = false;
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.remove(); bgmAudio = null; bgmCurrent = null; }
}

// ======================== INPUT HANDLING ========================
document.getElementById('game-view').addEventListener('click', (e) => {
  if (!gameStarted) return;

  if (e.target.closest('#top-bar') || e.target.closest('#settings-panel') ||
      e.target.closest('#choices-area') || e.target.closest('#ending-screen')) return;

  if (isTyping) {
    skipType();
    return;
  }
  advanceLine();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!gameStarted) return;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (isTyping) { skipType(); return; }
    advanceLine();
  }
  if (e.key === 'h') toggleHideUI();
  if (e.key === 'Escape') toggleSettings();
});

// ======================== START GAME ========================
function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  gameStarted = true;
  affection = 0;
  document.getElementById('aff-val').textContent = '0';
  document.getElementById('ui-layer').style.opacity = '1';
  document.getElementById('click-hint').style.display = 'block';

  // Load scene 1
  const scene = scenes.find(s => s.id === 'scene1');
  currentScene = scene.id;
  currentScript = scene.lines;
  currentLine = 0;
  setBG(scene.bg);
  playBGM(scene.bgm);
  renderLine();
}
